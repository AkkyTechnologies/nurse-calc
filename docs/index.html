<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Titr8</title>
<style>
  :root {
    --teal: #0d9488;
    --ink: #0f172a;
    --ink-soft: #475569;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #f1f5f9;
      --ink-soft: #cbd5e1;
      --bg: #0b1220;
      --card: #101a2c;
      --border: #24344a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  }
  .wrap { text-align: center; padding: 24px; }
  .mark {
    width: 56px; height: 56px; margin: 0 auto 20px;
    border-radius: 15px;
    background: linear-gradient(135deg, #14b8a6, #0f766e);
    display: flex; align-items: center; justify-content: center;
  }
  .mark svg { width: 28px; height: 28px; }
  h1 { font-size: 24px; margin: 0 0 28px; letter-spacing: -0.01em; }
  .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .links a {
    color: var(--teal);
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    border: 1px solid var(--border);
    background: var(--card);
    padding: 10px 20px;
    border-radius: 999px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3c0 0 6 6.2 6 9.6a6 6 0 1 1-12 0C6 9.2 12 3 12 3Z" fill="#fff"/><rect x="10.7" y="10.8" width="2.6" height="6" rx="1" fill="#0d9488"/><rect x="8.7" y="12.8" width="6" height="2.6" rx="1" fill="#0d9488"/></svg>
    </div>
    <h1>Titr8</h1>
    <div class="links">
      <a href="./support.html">Support</a>
      <a href="./privacy-policy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
